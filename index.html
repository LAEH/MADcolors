<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MADcolors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              slate: {
                850: '#1f2937',
                900: '#0f172a', // Darker text for light mode
                950: '#020617',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-in-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F5F5F7; /* Apple Light Gray */
        color: #1D1D1F; /* Apple Dark Text */
      }
      /* Custom Scrollbar for the grid container - Light Theme */
      .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.2);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.3);
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    </style>
<link rel="stylesheet" href="/index.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://madcolors.laeh.ai">
    <meta property="og:title" content="MADcolors">
    <meta property="og:description" content="Colors research">
    <meta property="og:image" content="https://madcolors.laeh.ai/android-chrome-512x512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="MADcolors">
    <meta name="twitter:description" content="Colors research">
    <meta name="twitter:image" content="https://madcolors.laeh.ai/android-chrome-512x512.png">
  </head>
  <body>
    <div id="root">
      <!-- Loading screen — replaced automatically when React mounts -->
      <style>
        .madcolors-loading {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #F5F5F7;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .madcolors-loading-inner {
          text-align: center;
          animation: madcolors-fade 1.8s ease-in-out infinite alternate;
        }
        .madcolors-loading-icon {
          width: 56px;
          height: 56px;
          margin: 0 auto 20px;
          border-radius: 50%;
          background: #0f172a;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 28px;
          box-shadow: 0 8px 30px rgba(15, 23, 42, 0.15);
        }
        .madcolors-loading-text {
          font-size: 22px;
          font-weight: 500;
          letter-spacing: -0.02em;
          color: #1D1D1F;
        }
        @keyframes madcolors-fade {
          0%   { opacity: 0.4; }
          100% { opacity: 1; }
        }
      </style>
      <div class="madcolors-loading">
        <div class="madcolors-loading-inner">
          <div class="madcolors-loading-icon">🎨</div>
          <div class="madcolors-loading-text">MADcolors</div>
        </div>
      </div>
    </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
