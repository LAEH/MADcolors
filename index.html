<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADcolors — Munsell Color System Visualizer</title>
  <meta name="description" content="A beautiful interactive visualization of the Munsell color system with thousands of colors organized by hue, value, and chroma.">
  <meta name="theme-color" content="#0f0f13">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <h1>MAD<span class="logo-accent">colors</span></h1>
        <p class="logo-sub">Munsell Color System Visualizer</p>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-view="wheel">Munsell Wheel</button>
        <button class="nav-btn" data-view="palettes">Palettes</button>
        <button class="nav-btn" data-view="explorer">Explorer</button>
      </nav>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <!-- Content rendered by JS -->
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Scripts -->
  <script src="js/color-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
